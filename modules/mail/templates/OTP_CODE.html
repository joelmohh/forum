<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Code</title>
</head>

<body style="margin:0; padding:0; background:#eef2f7; font-family:Arial, sans-serif;">

  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:50px 0;">
    <tr>
      <td align="center">

        <!-- WRAPPER (shadow fallback) -->
        <table role="presentation" width="100%" style="max-width:540px;">

          <tr>
            <td style="background:#ffffff; border:1px solid #d1d5db; border-radius:12px; overflow:hidden;">

              <!-- HEADER -->
              <table width="100%" role="presentation">
                <tr>
                  <td style="background:#FF9D00; padding:22px; text-align:center;">
                    <div style="color:#ffffff; font-size:16px; font-weight:700; letter-spacing:0.5px;">
                      Account Verification
                    </div>
                  </td>
                </tr>
              </table>

              <!-- BODY -->
              <table width="100%" role="presentation">
                <tr>
                  <td style="padding:34px; text-align:center;">

                    <p style="margin:0; font-size:15px; color:#374151;">
                      Use the code below to verify your account:
                    </p>

                    <!-- OTP BOX (stronger border) -->
                    <div style="margin:26px auto; display:inline-block;">

                      <div style="
                          font-size:34px;
                          letter-spacing:12px;
                          font-weight:800;
                          padding:16px 28px;
                          background:#f8fafc;
                          border:2px solid #cbd5e1;
                          border-radius:10px;
                          color:#111827;
                          font-family:monospace;
                          display:inline-block;
                      ">
                        {{OTP_CODE}}
                      </div>

                    </div>

                    <p style="margin-top:18px; font-size:13px; color:#6b7280;">
                      This code expires in <strong>15 minutes</strong>.
                    </p>

                    <p style="margin-top:6px; font-size:12px; color:#9ca3af;">
                      If you did not request this, you can ignore this email.
                    </p>

                  </td>
                </tr>
              </table>

              <!-- FOOTER -->
              <table width="100%" role="presentation">
                <tr>
                  <td style="padding:18px; text-align:center; font-size:11px; color:#9ca3af; border-top:1px solid #e5e7eb;">
                    © 2026 The Forum. All rights reserved.
                  </td>
                </tr>
              </table>

            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
